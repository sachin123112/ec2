name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]
    paths:
      - 'k8s/**'
      - 'backend-platform/**'
      - '.github/workflows/deploy-k8s.yml'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
      CONTAINER_REGISTRY: ${{ secrets.CONTAINER_REGISTRY }}
      CONTAINER_REPOSITORY: ${{ secrets.CONTAINER_REPOSITORY }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: '1.27.0'

    - name: Set kubeconfig
      run: |
        echo "$KUBE_CONFIG" | base64 --decode > kubeconfig
        export KUBECONFIG=$PWD/kubeconfig
        kubectl config view --minify

    - name: Build and push backend image to registry
      run: |
        if [ -n "$CONTAINER_REGISTRY" ]; then
          IMAGE=$CONTAINER_REGISTRY/$CONTAINER_REPOSITORY:${GITHUB_SHA}
          docker build -t "$IMAGE" -f backend-platform/services/auth-service/Dockerfile .
          echo "Pushing $IMAGE"
          docker push "$IMAGE"
          sed -i "s|__IMAGE_PLACEHOLDER__|$IMAGE|g" k8s/auth-deployment.yaml
        else
          echo "CONTAINER_REGISTRY not set; skipping image build and push."
        fi

    - name: Apply Kubernetes manifests
      run: |
        kubectl apply -f k8s/
        kubectl rollout status deployment/auth-deployment -n default --timeout=120s
