name: Backend CI

on:
  push:
    branches: [ main ]
    paths:
      - 'services/**'
      - 'backend-platform/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/**'
      - 'backend-platform/**'

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres123
          POSTGRES_DB: ec2_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Wait for Postgres
      run: |
        sudo apt-get update
        sudo apt-get install -y postgresql-client
        for i in {1..30}; do pg_isready -h localhost -p 5432 -U postgres && break || sleep 1; done

    - name: Run Flyway migrations
      run: |
        cd backend-platform
        mvn org.flywaydb:flyway-maven-plugin:9.16.0:migrate -Dflyway.url=jdbc:postgresql://localhost:5432/ec2_db -Dflyway.user=postgres -Dflyway.password=postgres123
    
    - name: Build backend-platform
      run: |
        cd backend-platform
        mvn clean package -DskipTests
    
    - name: Run backend tests
      run: |
        cd backend-platform
        mvn test
    
    - name: Build individual services
      run: |
        for service in backend-platform/services/*/; do
          service_name=$(basename "$service")
          if [ -f "$service/pom.xml" ]; then
            echo "Building $service_name..."
            cd "$service"
            mvn clean package -DskipTests
            cd ../../..
          fi
        done
      continue-on-error: true
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: backend-build-logs
        path: |
          backend-platform/target/
          backend-platform/services/*/target/
