name: Backend AWS Deploy (ECR -> ECS)

on:
  push:
    branches: [ main ]
    paths:
      - 'backend-platform/**'
      - 'services/**'
      - '.github/workflows/backend-aws.yml'

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
      ECS_SERVICE: ${{ secrets.ECS_SERVICE }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Docker image
      run: |
        IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${GITHUB_SHA}"
        docker build -t "$IMAGE_URI" -f backend-platform/services/auth-service/Dockerfile .
        docker push "$IMAGE_URI"

    - name: Register ECS task definition (template)
      run: |
        IMAGE_URI="$ECR_REGISTRY/$ECR_REPOSITORY:${GITHUB_SHA}"
        mkdir -p tmp
        jq --arg IMG "$IMAGE_URI" '.containerDefinitions[0].image=$IMG' k8s/ecs-task-def-template.json > tmp/taskdef.json
        aws ecs register-task-definition --cli-input-json file://tmp/taskdef.json

    - name: Update ECS service (force new deployment)
      run: |
        aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE" --force-new-deployment

    - name: Post-deploy status
      run: |
        echo "Deployed image: $ECR_REPOSITORY:${GITHUB_SHA} to ECS service $ECS_SERVICE"
