apiVersion: apps/v1
kind: Deployment

metadata:
  name: auth-service
  namespace: backend-platform

spec:
  replicas: 2

  selector:
    matchLabels:
      app: auth-service

  template:
    metadata:
      labels:
        app: auth-service

    spec:
      containers:

        - name: auth-service

          image: your-registry/auth-service:latest

          ports:
            - containerPort: 8081

          env:
            - name: DB_URL
              value: jdbc:postgresql://postgres:5432/backend_platform

            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
