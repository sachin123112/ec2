server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: auth-service

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ec2_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        
  security:
    user:
      name: dev
      password: DevPass123

  flyway:
    enabled: true
    baseline-on-migrate: true
    validate-on-migrate: false
    repair-on-migrate: true

  web:
    resources:
      static-locations: classpath:/static/,file:uploads/

jwt:
  secret: ${JWT_SECRET:ChangeThisToA256BitSecretKeyForProduction}
  expiration: 900000
